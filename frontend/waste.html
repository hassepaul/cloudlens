<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudLens — Waste</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d1218;--bg2:#131b24;--panel:#18222e;--panel2:#1d2935;--line:#263340;--lineSoft:#1e2a36;
--txt:#e6edf3;--txt2:#9fb0c0;--txt3:#647386;--teal:#2dd4bf;--tealDim:#14463f;--amber:#f5a524;--amberDim:#4a3410;
--red:#f0506e;--redDim:#4a1622;--blue:#4d9fff;--blueDim:#13314d;--purple:#a78bfa;--green:#36d399;--greenDim:#0f3020;
--mono:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:radial-gradient(1100px 500px at 75% -10%,#16212e 0,transparent 60%),var(--bg);
color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;padding:22px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.wrap{max-width:1080px;margin:0 auto}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.head h1{font-family:var(--mono);font-size:19px;font-weight:600;display:flex;align-items:center;gap:10px}
.head h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber)}
.ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,input{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-family:var(--mono);font-size:12px;padding:6px 10px;outline:none}
select:focus,input:focus{border-color:var(--teal)}
.sitenav{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:16px;padding:5px;background:var(--panel);border:1px solid var(--lineSoft);border-radius:10px}
.snav-link{font-family:var(--mono);font-size:11px;color:var(--txt2);padding:4px 9px;border-radius:6px;text-decoration:none}
.snav-link:hover{background:var(--panel2);color:var(--txt)}.snav-link.active{background:var(--amberDim);color:var(--amber)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:linear-gradient(180deg,var(--panel) 0,var(--bg2) 100%);border:1px solid var(--lineSoft);border-radius:11px;padding:14px 16px}
.kpi .l{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.kpi .v{font-family:var(--mono);font-size:23px;font-weight:600}
.kpi.amber .v{color:var(--amber)}.kpi.teal .v{color:var(--teal)}.kpi.red .v{color:var(--red)}
.card{background:linear-gradient(180deg,var(--panel) 0,var(--bg2) 100%);border:1px solid var(--lineSoft);border-radius:13px;padding:18px 20px}
.item{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:1px solid var(--lineSoft)}
.item:last-child{border-bottom:0}
.prio{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
.prio.critical{background:var(--red)}.prio.high{background:var(--amber)}.prio.medium{background:var(--blue)}.prio.low{background:var(--txt3)}
.item .c{flex:1;min-width:0}
.item .t{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wt{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:5px;background:var(--panel2);color:var(--txt2)}
.item .rec{font-size:12px;color:var(--txt2);margin-top:4px;line-height:1.5}
.item .meta{font-size:10.5px;color:var(--txt3);font-family:var(--mono);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.item .save{text-align:right;flex-shrink:0}
.item .save .n{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--teal)}
.item .save .p{font-size:10.5px;color:var(--txt3);font-family:var(--mono)}
.btn{background:var(--tealDim);border:1px solid var(--teal);color:var(--teal);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer}
.btn:hover{background:#1a5c50;color:#eafffb}
.btn.sm{font-size:10px;padding:4px 9px}
.pill{font-family:var(--mono);font-size:9.5px;padding:2px 8px;border-radius:6px;background:var(--greenDim);color:var(--green)}
.msg{font-size:12px;font-family:var(--mono);margin-top:10px}
.ok{color:var(--teal)}.err{color:var(--red)}.note{font-size:12px;color:var(--txt3)}
</style>
</head>
<body>
<div class="wrap">
<nav class="sitenav" aria-label="CloudLens navigation">
  <a href="index.html" class="snav-link">⊞ Explorer</a>
  <a href="insights.html" class="snav-link">◈ Insights</a>
  <a href="waste.html" class="snav-link active">🗑 Waste</a>
  <a href="optimization.html" class="snav-link">◎ Optimize</a>
  <a href="reports.html" class="snav-link">▤ Reports</a>
  <a href="policies.html" class="snav-link">⚖ Policies</a>
  <a href="hierarchy.html" class="snav-link">⊞ Hierarchy</a>
  <a href="admin.html" class="snav-link">⚙ Admin</a>
</nav>
  <h2 class="sr-only">CloudLens waste findings: idle and orphaned resources with recoverable savings and one-click resolve</h2>
  <div class="head">
    <h1><span class="dot"></span> CloudLens · Waste</h1>
    <div class="ctrl">
      <select id="tenant-sel" onchange="load()">
        <option value="t-acme">t-acme (Acme Corp)</option>
        <option value="t-1">t-1 (Demo)</option>
      </select>
      <select id="prio" onchange="load()">
        <option value="">All priorities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="resolved" onchange="load()">
        <option value="false">Open</option>
        <option value="true">Resolved</option>
      </select>
      <button class="btn" onclick="load()">↻ Refresh</button>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi amber"><div class="l">Recoverable / month</div><div class="v" id="k-save">—</div></div>
    <div class="kpi red"><div class="l">Critical items</div><div class="v" id="k-crit">—</div></div>
    <div class="kpi teal"><div class="l">Total findings</div><div class="v" id="k-count">—</div></div>
    <div class="kpi"><div class="l">Current monthly cost</div><div class="v" id="k-cost">—</div></div>
  </div>

  <div class="card">
    <div id="items"><div class="note">Loading…</div></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const API='';
const EUR=n=>'€'+Math.round(n).toLocaleString('en-US');
function tid(){return document.getElementById('tenant-sel').value;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function load(){
  const items=document.getElementById('items');
  items.innerHTML='<div class="note">Loading…</div>';
  document.getElementById('msg').textContent='';
  const prio=document.getElementById('prio').value;
  const resolved=document.getElementById('resolved').value;
  const qs=new URLSearchParams({resolved,limit:'200'});
  if(prio)qs.set('priority',prio);
  try{
    const list=await fetch(`${API}/api/v1/waste/${tid()}?${qs}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
    const totSave=list.reduce((s,w)=>s+(w.saving_eur||0),0);
    const totCost=list.reduce((s,w)=>s+(w.monthly_cost_eur||0),0);
    const crit=list.filter(w=>w.priority==='critical').length;
    document.getElementById('k-save').textContent=EUR(totSave);
    document.getElementById('k-crit').textContent=crit;
    document.getElementById('k-count').textContent=list.length;
    document.getElementById('k-cost').textContent=EUR(totCost);
    if(!list.length){items.innerHTML='<div class="note">No waste items match this filter.</div>';return;}
    const isResolved=resolved==='true';
    items.innerHTML=list.map(w=>{
      const detected=w.detected_at?new Date(w.detected_at).toLocaleDateString():'';
      const action=isResolved
        ? `<span class="pill">✓ ${esc(w.resolved_by||'resolved')}</span>`
        : `<button class="btn sm" onclick="resolve('${esc(w.id)}')">resolve</button>`;
      return `<div class="item">
        <div class="prio ${esc(w.priority)}"></div>
        <div class="c">
          <div class="t">${esc(w.resource_name||w.resource_id)} <span class="wt">${esc((w.waste_type||'').replace(/_/g,' '))}</span></div>
          <div class="rec">${esc(w.recommendation||'')}</div>
          <div class="meta"><span>${esc(w.resource_group||'')}</span><span>detected ${detected}</span><span>${EUR(w.monthly_cost_eur||0)}/mo current</span></div>
        </div>
        <div class="save"><div class="n">${EUR(w.saving_eur||0)}</div><div class="p">${Math.round(w.saving_pct||0)}% · save/mo</div>${action}</div>
      </div>`;
    }).join('');
  }catch(e){items.innerHTML=`<div class="err" style="font-family:var(--mono);font-size:12px">Failed to load waste: ${esc(e.message)}</div>`;}
}

async function resolve(id){
  const by=prompt('Resolved by (your name):','operator');
  if(by===null)return;
  const msg=document.getElementById('msg');
  try{
    const r=await fetch(`${API}/api/v1/waste/${tid()}/${id}/resolve`,{method:'PATCH',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({resolved_by:by||'operator',notes:null})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    msg.className='msg ok';msg.textContent='Item resolved.';
    load();
  }catch(e){msg.className='msg err';msg.textContent='Resolve failed: '+e.message;}
}
load();
</script>
</body>
</html>
